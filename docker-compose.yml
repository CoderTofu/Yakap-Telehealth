services:
  db:
    image: postgres:16-alpine
    container_name: yakap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yakap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yakap_dev}
      POSTGRES_DB: ${POSTGRES_DB:-yakap_db}
    ports:
      - "5000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yakap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: yakap_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-yakap}:${POSTGRES_PASSWORD:-yakap_dev}@db:5432/${POSTGRES_DB:-yakap_db}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: yakap_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
